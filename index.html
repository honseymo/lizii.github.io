<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="cat.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лизи любимка</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, rgb(122, 225, 202) 26%, rgb(249, 224, 220) 55%, rgb(237, 242, 208));
            color: #333;
        }

        .progress-button {
            padding: 20px 30px;
            font-size: 16px;
            color: white;
            background-color: grey;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .progress-button:hover {
            background-color: #373838bb;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            font-weight: bold;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            width: 100%;
            z-index: 1;
        }

        .progress-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff8a00, #da1b60);
            width: 0%;
            transition: width 0.1s linear;
        }

        .flexboxr {
            z-index: 1000;
            width: 70%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .kotik1 {
            display: none;
            max-width: 100%;
            height: auto;
            margin-top: 20px;
        }

        .canva {
            position: absolute;
        }
    </style>
</head>

<body>
    <canvas class="canva"></canvas>
    <div class="flexboxr">
        <img src="kotik.jpg" class="kotik1" alt="Милый котик">
        <button class="progress-button" id="progressBtn">
            <span class="progress-text">Кнопочка для лизы!</span>
            <div class="progress-bar"></div>
            <div class="progress-fill" id="progressFill"></div>
        </button>
    </div>
    <script>
        function startProgressAnimation1() {
        const rndColor = () => {
            const base = Math.random() * 360 | 0;
            const color = (275 * (base / 200 | 0)) + base % 200;
            return fac => `hsl(${color}, ${(fac || 1) * 100}%, ${(fac || 1) * 60}%)`;
        };

        class Battery {
            constructor(fireworks) {
                this.fireworks = fireworks;
                this.salve = [];
                this.x = Math.random();
                this.t = 0;
                this.tmod = 20 + Math.random() * 20 | 0;
                this.tmax = 500 + Math.random() * 1000;

                this._shot = salve => {
                    // console.log(this.x * this.fireworks.width, salve.y);
                    if (salve.y < salve.ym) {
                        salve.cb = this._prepareExplosion;
                    }

                    salve.x += salve.mx;
                    salve.y -= 0.01;

                    const r = Math.atan2(-0.01, salve.mx);

                    this.fireworks.engine.strokeStyle = salve.c(.7);
                    this.fireworks.engine.beginPath();

                    this.fireworks.engine.moveTo(
                        (this.x + salve.x) * this.fireworks.width + Math.cos(r) * 4,
                        salve.y * this.fireworks.height + Math.sin(r) * 4
                    );

                    this.fireworks.engine.lineTo(
                        (this.x + salve.x) * this.fireworks.width + Math.cos(r + Math.PI) * 4,
                        salve.y * this.fireworks.height + Math.sin(r + Math.PI) * 4
                    );

                    this.fireworks.engine.lineWidth = 3;
                    this.fireworks.engine.stroke();

                    // this.fireworks.engine.fillRect((this.x + salve.x) * this.fireworks.width, salve.y * this.fireworks.height, 10, 10);
                };

                this._prepareExplosion = salve => {
                    salve.explosion = [];

                    for (let i = 0, max = 32; i < max; i++) {
                        salve.explosion.push({
                            r: 2 * i / Math.PI,
                            s: 0.5 + Math.random() * 0.5,
                            d: 0,
                            y: 0
                        });
                    }

                    salve.cb = this._explode;
                };

                this._explode = salve => {

                    this.fireworks.engine.fillStyle = salve.c();

                    salve.explosion.forEach(explo => {

                        explo.d += explo.s;
                        explo.s *= 0.99;
                        explo.y += 0.5;

                        const alpha = explo.s * 2.5;
                        this.fireworks.engine.globalAlpha = alpha;

                        if (alpha < 0.05) {
                            salve.cb = null;
                        }

                        this.fireworks.engine.fillRect(
                            Math.cos(explo.r) * explo.d + (this.x + salve.x) * this.fireworks.width,
                            Math.sin(explo.r) * explo.d + explo.y + salve.y * this.fireworks.height,
                            3,
                            3
                        );
                    });

                    this.fireworks.engine.globalAlpha = 1;
                }
            }

            pushSalve() {
                this.salve.push({
                    x: 0,
                    mx: -0.02 * Math.random() * 0.04,
                    y: 1,
                    ym: 0.05 + Math.random() * 0.5,
                    c: rndColor(),
                    cb: this._shot
                });
            };

            render() {

                this.t++;

                if (this.t < this.tmax && (this.t % this.tmod) === 0) {
                    this.pushSalve();
                }

                let rendered = false;

                this.salve.forEach(salve => {

                    if (salve.cb) {
                        rendered = true;
                        salve.cb(salve);
                    }

                });

                if (this.t > this.tmax) {
                    return rendered;
                }

                return true;
            }
        }

        class Fireworks {
            constructor() {
                this.canvas = window.document.querySelector('canvas');
                this.engine = this.canvas.getContext('2d');
                this.stacks = new Map();

                this.resize();
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;

                this.canvas.setAttribute('width', this.width);
                this.canvas.setAttribute('height', this.height);
            }

            clear() {
                this.engine.clearRect(0, 0, this.width, this.height);
                this.engine.fillStyle = '#222';
                this.engine.fillRect(0, 0, this.width, this.height);
            }

            addBattery() {
                const bat = new Battery(this);
                this.stacks.set(Date.now(), bat);
            }

            render() {

                if (Math.random() < 0.05) {
                    this.addBattery();
                }

                this.clear();

                this.stacks.forEach((scene, key) => {

                    const rendered = scene.render();

                    if (!rendered) {
                        this.stacks.delete(key);
                    }
                });

                requestAnimationFrame(this.render.bind(this));
            }

            run() {
                for (let i = 0; i < 5; i++) {
                    this.addBattery();
                }
                window.addEventListener('resize', this.resize.bind(this));
                this.render();
            }
        }

        a = new Fireworks();
        a.run();
    };
    </script>

        a = new Fireworks();
        a.run();
    };
        const button = document.getElementById('progressBtn');
        const progressFill = document.getElementById('progressFill');
        let progress = 0;
        let interval = null;

        

        function startProgressAnimation() {
            // Очистка предыдущего интервала, если он был
            if (interval) {
                clearInterval(interval);
            }

            // Сброс прогресса
            progress = 0;
            progressFill.style.width = '0%';
            button.disabled = true;
            button.querySelector('.progress-text').textContent = '0%';

            interval = setInterval(function () {
                progress += 1;
                progressFill.style.width = progress + '%';
                button.querySelector('.progress-text').textContent = progress + '%';

                if (progress >= 100) {
                    clearInterval(interval);
                    interval = null;
                    button.disabled = false;
                    // Устанавливаем финальную надпись — она останется до следующего нажатия
                    button.querySelector('.progress-text').textContent = 'Я тебя очень люблю!';
                    startProgressAnimation1();
                    // Показываем картинку котика
                    const kotik = document.querySelector('.kotik1');
                    if (kotik) {
                        kotik.style.display = 'block';
                    } else {
                        console.error('Элемент с классом .kotik1 не найден!');
                    }
                }
            }, 50);
        }


        button.addEventListener('click', function () {
            // Если кнопка уже активна (не заблокирована), начинаем новую анимацию
            if (!button.disabled) {
                startProgressAnimation();
            }
        });
    </script>
</body>

</html>
